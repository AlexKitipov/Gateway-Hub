version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gateway-hub-db
    environment:
      POSTGRES_DB: ${DB_NAME:-gateway_hub}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  redis:
    image: redis:7-alpine
    container_name: gateway-hub-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway-hub-migrate
    environment:
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-gateway_hub}
      DATABASE_URL: postgresql://${DB_USER:-appuser}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-gateway_hub}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/scripts/migrate.sh"]
    profiles:
      - migrations
    networks:
      - gateway-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway-hub-backend
    environment:
      APP_ENV: local
      LOCAL_DEMO_USER_ENABLED: "true"
      LOCAL_DEMO_USERNAME: "user"
      LOCAL_DEMO_PASSWORD: "password123"
      LOCAL_DEMO_EMAIL: "user@example.com"

      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-gateway_hub}

      DATABASE_URL: postgresql://${DB_USER:-appuser}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-gateway_hub}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "8000:8000"
    networks:
      - gateway-network

volumes:
  postgres_data:
  redis_data:

networks:
  gateway-network:
    driver: bridge
