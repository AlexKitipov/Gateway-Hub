services:
  postgres:
    image: postgres:15-alpine
    container_name: gateway-hub-db
    environment:
      POSTGRES_DB: ${DB_NAME:-gateway_hub}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-gateway_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  redis:
    image: redis:7-alpine
    container_name: gateway-hub-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway-hub-migrate
    environment:
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-gateway_hub}
      DATABASE_URL: postgresql://${DB_USER:-appuser}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-gateway_hub}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/app/scripts/migrate.sh"]
    restart: "no"
    networks:
      - gateway-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway-hub-backend
    environment:
      APP_ENV: local
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-dev-compose-secret-key-change-me}
      LOCAL_DEMO_USER_ENABLED: ${LOCAL_DEMO_USER_ENABLED:-true}
      LOCAL_DEMO_USERNAME: ${LOCAL_DEMO_USERNAME:-user}
      LOCAL_DEMO_PASSWORD: ${LOCAL_DEMO_PASSWORD:-password123}
      LOCAL_DEMO_EMAIL: ${LOCAL_DEMO_EMAIL:-user@example.com}
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-gateway_hub}
      DATABASE_URL: postgresql://${DB_USER:-appuser}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-gateway_hub}
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000,http://localhost:8080}
      SHORT_URL_BASE: ${SHORT_URL_BASE:-http://localhost:8000/r}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - gateway-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
    container_name: gateway-hub-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - gateway-network

  nginx:
    image: nginx:1.27-alpine
    container_name: gateway-hub-nginx
    profiles:
      - proxy
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF_NGINX'
        upstream gateway_backend {
            server backend:8000;
        }

        upstream gateway_frontend {
            server frontend:80;
        }

        server {
            listen 80;
            server_name _;

            location /api/ {
                proxy_pass http://gateway_backend;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
            }

            location /r/ {
                proxy_pass http://gateway_backend;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
            }

            location / {
                proxy_pass http://gateway_frontend;
                proxy_http_version 1.1;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
            }
        }
        EOF_NGINX
        nginx -g 'daemon off;'
    ports:
      - "${NGINX_PORT:-8080}:80"
    networks:
      - gateway-network

volumes:
  postgres_data:
  redis_data:

networks:
  gateway-network:
    driver: bridge
