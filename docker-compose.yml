version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gateway-hub-db
    environment:
      POSTGRES_DB: ${DB_NAME:-gateway_hub}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  redis:
    image: redis:7-alpine
    container_name: gateway-hub-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway-hub-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-appuser}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-gateway_hub}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "${DEBUG:-false}"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,https://app.example.com}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - gateway-network

volumes:
  postgres_data:
  redis_data:

networks:
  gateway-network:
    driver: bridge
